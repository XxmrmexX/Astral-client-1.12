<!DOCTYPE html>
<html lang="en" style="width:100%;height:100%;background-color:black;">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Astral Client 1.12.2 — cosmic Eaglercraft experience">
    <meta name="keywords" content="astral client, eaglercraft, minecraft, 1.12.2, shaders, blackhole">
    <title>Astral Client 1.12.2</title>
    <meta property="og:title" content="Astral Client 1.12.2">
    <meta property="og:description" content="Cosmic Eaglercraft client with shader-style visuals and blackhole branding">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="en-US">
    <link rel="shortcut icon" type="image/png" href="astral_logo.png">
    <script type="text/javascript" src="classes.js"></script>
    <script type="text/javascript">
      "use strict";
      window.addEventListener("load", function() {
        if(window.location.href.indexOf("file:") === 0) {
          alert("Please run this via HTTP — local file loading is blocked.");
        } else {
          var relayId = Math.floor(Math.random() * 3);
          window.eaglercraftXOpts = {
            demoMode: false,
            container: "game_frame",
            assetsURI: "assets.epk",
            localesURI: "lang/",
            worldsDB: "worlds",
            logInvalidCerts: true,
            crashOnUncaughtExceptions: true
          };
          main();
        }
      });
    </script>
  </head>
  <body style="margin:0;width:100%;height:100%;overflow:hidden;background-color:black;" id="game_frame">
    <!-- Astral Client logo overlay -->
    <div style="position:absolute;top:20px;left:20px;z-index:10;">
      <img src="astral_logo.png" alt="Astral Client Logo" style="width:128px;height:128px;">
    </div>
  </body>
</html>
